<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>日本中部 15 日自由行</title>
<!-- App 圖示的楓葉路徑取自 Font Awesome（canadian-maple-leaf），授權 CC BY 4.0：https://fontawesome.com -->
<meta name="theme-color" content="#b8472e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="日本行程">
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root{
  --paper:#f4ede0;--paper-2:#efe6d6;--card:#fffdf8;
  --ink:#241f19;--ink-soft:#5e564c;--ink-faint:#928a7d;--line:#e1d6c2;
  --momiji:#b8472e;--persimmon:#c2693a;--slate:#5b7c91;--cedar:#5d7e57;--hida:#b58a36;--home:#8a8278;--gold:#c2913f;
  --shadow:0 1px 2px rgba(60,45,25,.06),0 8px 24px rgba(60,45,25,.06);
  --serif:'Shippori Mincho','Noto Serif TC','Noto Serif JP','Songti TC','Songti SC',serif;
  --sans:'Noto Sans TC','Noto Sans JP',-apple-system,BlinkMacSystemFont,'PingFang TC','Hiragino Sans','Microsoft JhengHei',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);color:var(--ink);background:var(--paper);
  background-image:radial-gradient(circle at 12% 18%, rgba(184,71,46,.04), transparent 40%),radial-gradient(circle at 88% 82%, rgba(91,124,145,.05), transparent 42%);
  line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:40px;
}
.wrap{max-width:680px;margin:0 auto;padding:0 16px}

header{padding:20px 0 14px;text-align:center}
.eyebrow{font-size:12px;letter-spacing:.32em;color:var(--momiji);font-weight:700;text-indent:.32em;margin-bottom:10px}
h1{font-family:var(--serif);font-weight:700;font-size:clamp(26px,6.6vw,38px);letter-spacing:.05em;line-height:1.15;color:var(--ink)}
h1 .leaf{display:inline-block;vertical-align:-3px;width:.85em;height:.85em;margin:0 .14em}
.daterange{font-family:var(--serif);font-size:15px;color:var(--ink-soft);letter-spacing:.18em;margin-top:8px}
.route{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:7px;margin-top:16px;font-size:12.5px;color:var(--ink-soft);letter-spacing:.05em}
.route .seg{display:inline-flex;align-items:center;gap:6px}
.route .dot{width:8px;height:8px;border-radius:50%}
.route .arr{color:var(--ink-faint);font-size:11px}

.tabbar{position:sticky;top:0;z-index:30;background:rgba(244,237,224,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);margin-top:18px}
.tabs{display:flex;max-width:680px;margin:0 auto;padding:0 16px}
.tab{flex:1;appearance:none;border:none;background:none;cursor:pointer;font-family:var(--sans);font-size:15px;font-weight:700;color:var(--ink-faint);padding:15px 4px 13px;letter-spacing:.08em;position:relative;transition:color .2s}
.tab[aria-selected="true"]{color:var(--ink)}
.tab[aria-selected="true"]::after{content:"";position:absolute;left:50%;bottom:-1px;transform:translateX(-50%);width:32px;height:3px;border-radius:3px;background:var(--momiji)}
.tab:focus-visible{outline:2px solid var(--slate);outline-offset:-4px;border-radius:6px}

main{padding-top:22px}
.panel{display:none;animation:fade .4s ease both}
.panel.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.region-key{display:flex;flex-wrap:wrap;gap:11px 15px;justify-content:center;font-size:11.5px;color:var(--ink-soft);margin-bottom:24px}
.region-key span{display:inline-flex;align-items:center;gap:5px}
.region-key i{width:9px;height:9px;border-radius:2px;display:inline-block}

.timeline{position:relative;padding-left:54px}
.timeline::before{content:"";position:absolute;left:21px;top:6px;bottom:6px;width:2px;background:var(--line)}
.day{position:relative;margin-bottom:18px}
.node{position:absolute;left:-54px;top:2px;width:44px;text-align:center}
.node .num{font-family:var(--serif);font-size:11px;font-weight:700;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:var(--shadow);position:relative;z-index:2}
.node .leaf-mark{position:absolute;top:-7px;right:1px;width:15px;height:15px;z-index:3;filter:drop-shadow(0 1px 1px rgba(0,0,0,.15))}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px 14px;box-shadow:var(--shadow);border-left:4px solid var(--line)}
.card .top{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap;margin-bottom:9px}
.card .wd{font-size:11px;font-weight:700;color:#fff;border-radius:20px;padding:2px 9px;letter-spacing:.05em;white-space:nowrap}
.card .date{font-family:var(--serif);font-size:13px;color:var(--ink-faint);letter-spacing:.06em}
.card h3{font-family:var(--serif);font-size:18px;font-weight:700;letter-spacing:.03em;color:var(--ink);flex:1 1 100%;line-height:1.3}
.row{display:flex;gap:9px;font-size:13.5px;color:var(--ink-soft);margin-top:7px;line-height:1.55}
.row .lbl{flex-shrink:0;color:var(--ink-faint);font-size:11px;font-weight:700;min-width:46px;letter-spacing:.03em;margin-top:2px}
.note{color:var(--momiji);font-size:12.5px}
.note .lbl{color:var(--momiji);opacity:.85}
.booklink{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:12px;font-weight:600;color:var(--slate);text-decoration:none;border:1px solid var(--line);border-radius:8px;padding:5px 11px;background:#fbf8f1;transition:.18s}
.booklink:hover{border-color:var(--slate);background:#f3f7f9}
.booklink:focus-visible{outline:2px solid var(--slate);outline-offset:2px}
.stay-link{color:var(--slate);text-decoration:underline;text-underline-offset:2px;text-decoration-color:var(--line);transition:.15s}
.stay-link:hover{text-decoration-color:var(--slate)}
.stay-link:focus-visible{outline:2px solid var(--slate);outline-offset:2px;border-radius:3px}

.exp-total{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-top:10px;margin-bottom:18px;text-align:center}
.exp-total .cap{font-size:11px;letter-spacing:.22em;color:var(--ink-faint);font-weight:700;text-transform:uppercase}
.exp-total .twd{font-family:var(--serif);font-size:38px;font-weight:700;color:var(--ink);margin:4px 0;letter-spacing:.02em}
.exp-total .sub{font-size:13px;color:var(--ink-soft);display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.exp-total .sub b{color:var(--ink);font-weight:600}
.rate-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;font-size:11.5px;color:var(--ink-faint)}
.rate-row input{width:62px;font-family:var(--sans);font-size:12.5px;text-align:center;border:1px solid var(--line);border-radius:6px;padding:3px 4px;background:#fbf8f1;color:var(--ink)}
.rate-row input:focus{outline:2px solid var(--slate);outline-offset:0}

.breakdown{display:flex;height:9px;border-radius:6px;overflow:hidden;margin-bottom:5px;background:var(--line)}
.breakdown div{height:100%}
.breakdown-legend{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:11.5px;color:var(--ink-soft);margin-bottom:20px;justify-content:center}
.breakdown-legend span{display:inline-flex;align-items:center;gap:5px}
.breakdown-legend i{width:9px;height:9px;border-radius:2px}

.seed-card{background:#fbf6ec;border:1px dashed var(--hida);border-radius:14px;padding:14px 16px;margin-bottom:18px}
.seed-ttl{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px}
.seed-sub{font-size:12.5px;color:var(--ink-soft);line-height:1.6}
.seed-sub b{color:var(--hida)}
.seed-btns{display:flex;gap:8px;margin-top:12px}
.seed-btn{appearance:none;border:none;cursor:pointer;font-family:var(--sans);font-size:13.5px;font-weight:700;padding:10px;border-radius:9px;transition:.18s;letter-spacing:.03em}
.seed-btn.add{flex:1;background:var(--hida);color:#fff}
.seed-btn.add:hover{filter:brightness(1.06)}
.seed-btn.add:disabled{opacity:.5;cursor:default}
.seed-btn.rm{flex:0 0 84px;background:#f0eee9;color:var(--ink-faint)}
.seed-btn.rm:hover{color:var(--momiji)}
.seed-btn:focus-visible{outline:2px solid var(--slate);outline-offset:2px}

.exp-form{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:var(--shadow);margin-bottom:18px}
.exp-form .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1 / -1}
.field label{font-size:11px;font-weight:700;color:var(--ink-faint);letter-spacing:.05em}
.field input,.field select{font-family:var(--sans);font-size:14px;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px 10px;background:#fbf8f1}
.field input:focus,.field select:focus{outline:2px solid var(--slate);outline-offset:0;background:#fff}
.cur-toggle{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.cur-toggle button{flex:1;appearance:none;border:none;background:#fbf8f1;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--ink-faint);padding:9px 0;transition:.15s}
.cur-toggle button.on{background:var(--momiji);color:#fff}
.addbtn{width:100%;margin-top:12px;appearance:none;border:none;cursor:pointer;background:var(--ink);color:var(--paper);font-family:var(--sans);font-weight:700;font-size:15px;letter-spacing:.08em;padding:12px;border-radius:10px;transition:.18s}
.addbtn:hover{background:var(--momiji)}
.addbtn:focus-visible{outline:2px solid var(--slate);outline-offset:2px}

.exp-list{display:flex;flex-direction:column;gap:8px}
.exp-item{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;box-shadow:var(--shadow)}
.exp-item .cat-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.exp-item .meta{flex:1;min-width:0}
.exp-item .meta .ttl{font-size:14px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exp-item .meta .sub{font-size:11.5px;color:var(--ink-faint)}
.exp-item .amt{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--ink);white-space:nowrap}
.exp-item .del{appearance:none;border:none;background:none;cursor:pointer;color:var(--ink-faint);font-size:18px;line-height:1;padding:2px 4px;border-radius:6px;transition:.15s}
.exp-item .del:hover{color:var(--momiji)}
.exp-payer{font-family:var(--sans);font-size:11px;color:var(--slate);border:1px solid var(--line);border-radius:6px;padding:2px 4px;background:#fbf8f1;max-width:96px}
.exp-payer:focus{outline:2px solid var(--slate);outline-offset:0}
.exp-item .meta .sub{font-size:11.5px;color:var(--ink-faint);display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px}

.settle-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow);margin-top:22px}
.settle-ttl{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--ink);letter-spacing:.03em;margin-bottom:14px}
.members-label{font-size:11px;font-weight:700;color:var(--ink-faint);letter-spacing:.06em;margin-bottom:8px}
.members-box{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.member-chip{display:inline-flex;align-items:center;gap:6px;background:#f3f0e8;border:1px solid var(--line);border-radius:20px;padding:5px 6px 5px 12px;font-size:13px;font-weight:600;color:var(--ink)}
.member-chip button{appearance:none;border:none;background:none;cursor:pointer;color:var(--ink-faint);font-size:15px;line-height:1;padding:0 2px;border-radius:50%}
.member-chip button:hover{color:var(--momiji)}
.member-add{display:flex;gap:8px;margin-bottom:16px}
.member-add input{flex:1;font-family:var(--sans);font-size:14px;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:#fbf8f1}
.member-add input:focus{outline:2px solid var(--slate);outline-offset:0;background:#fff}
.member-add button{flex:0 0 46px;appearance:none;border:none;cursor:pointer;background:var(--cedar);color:#fff;font-size:18px;font-weight:700;border-radius:9px;transition:.15s}
.member-add button:hover{filter:brightness(1.06)}
.member-add button:focus-visible{outline:2px solid var(--slate);outline-offset:2px}

.settle-hint{font-size:12.5px;color:var(--ink-faint);line-height:1.6;background:#faf6ec;border-radius:10px;padding:12px 13px}
.settle-meta{font-size:12px;color:var(--ink-faint);margin-bottom:12px}
.settle-meta b{color:var(--ink)}
.balrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.balrow:last-child{border-bottom:none}
.balrow .nm{flex:1;font-size:14px;font-weight:600;color:var(--ink)}
.balrow .paid{font-size:11.5px;color:var(--ink-faint);white-space:nowrap}
.balrow .net{font-family:var(--serif);font-size:14px;font-weight:700;white-space:nowrap;min-width:96px;text-align:right}
.net.pos{color:var(--cedar)}
.net.neg{color:var(--momiji)}
.net.zero{color:var(--ink-faint)}
.plan-ttl{font-size:11px;font-weight:700;color:var(--ink-faint);letter-spacing:.06em;margin:16px 0 9px}
.txrow{display:flex;align-items:center;gap:8px;background:#f3f6f1;border-radius:10px;padding:11px 13px;margin-bottom:8px;font-size:14px}
.txrow .who{font-weight:700;color:var(--ink)}
.txrow .arr{color:var(--cedar);font-weight:700}
.txrow .amt{margin-left:auto;font-family:var(--serif);font-weight:700;color:var(--ink)}
.all-even{text-align:center;font-size:13.5px;color:var(--cedar);font-weight:600;padding:14px}

.todo-head{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);margin-top:10px;margin-bottom:18px;display:flex;align-items:center;gap:14px}
.todo-head .ring{position:relative;width:54px;height:54px;flex-shrink:0}
.todo-head .ring svg{transform:rotate(-90deg)}
.todo-head .ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:14px;font-weight:700;color:var(--ink)}
.todo-head .txt h3{font-family:var(--serif);font-size:16px;font-weight:700;letter-spacing:.03em}
.todo-head .txt p{font-size:12.5px;color:var(--ink-soft);margin-top:2px}

.todo-item{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;box-shadow:var(--shadow);margin-bottom:9px;transition:.2s}
.todo-item.done{opacity:.55}
.todo-item.done .ti-ttl{text-decoration:line-through;color:var(--ink-faint)}
.check{flex-shrink:0;width:24px;height:24px;border-radius:7px;border:2px solid var(--line);background:#fbf8f1;cursor:pointer;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.15s;appearance:none}
.check.on{background:var(--cedar);border-color:var(--cedar)}
.check.on::after{content:"✓";color:#fff;font-size:14px;font-weight:700}
.check:focus-visible{outline:2px solid var(--slate);outline-offset:2px}
.ti-body{flex:1;min-width:0}
.ti-ttl{font-size:14.5px;font-weight:600;color:var(--ink);line-height:1.35}
.ti-meta{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:5px;font-size:11.5px;color:var(--ink-faint)}
.ti-meta .due{font-weight:700}
.countdown{display:inline-block;font-size:10.5px;font-weight:700;padding:1px 8px;border-radius:20px;letter-spacing:.04em}
.cd-soon{background:#fceae2;color:var(--momiji)}
.cd-ok{background:#eef2ec;color:var(--cedar)}
.cd-over{background:#f0eee9;color:var(--ink-faint)}
.ti-link{display:inline-flex;align-items:center;gap:4px;margin-top:9px;font-size:11.5px;font-weight:600;color:var(--slate);text-decoration:none;border:1px solid var(--line);border-radius:7px;padding:4px 10px;background:#fbf8f1}
.ti-link:hover{border-color:var(--slate)}

.empty{text-align:center;color:var(--ink-faint);font-size:13.5px;padding:30px 10px}
footer{text-align:center;font-size:11px;color:var(--ink-faint);margin-top:34px;letter-spacing:.05em;line-height:1.9}
footer .leaf{display:inline-block;width:11px;height:11px;vertical-align:-1px;margin:0 3px}

.trip-bar{display:flex;justify-content:flex-end;margin-top:10px;margin-bottom:14px}
.edit-toggle{appearance:none;border:1px solid var(--line);background:var(--card);cursor:pointer;font-family:var(--sans);font-size:12.5px;font-weight:700;color:var(--ink-soft);padding:6px 14px;border-radius:20px;transition:.15s;box-shadow:var(--shadow)}
.edit-toggle.on{background:var(--momiji);color:#fff;border-color:var(--momiji)}
.edit-toggle:focus-visible{outline:2px solid var(--slate);outline-offset:2px}
.day-tools{display:flex;gap:6px;margin-top:12px;padding-top:11px;border-top:1px dashed var(--line)}
.dtool{appearance:none;border:1px solid var(--line);background:#fbf8f1;cursor:pointer;font-size:13px;padding:5px 11px;border-radius:8px;transition:.15s;color:var(--ink-soft)}
.dtool:hover:not(:disabled){border-color:var(--slate);background:#fff}
.dtool:disabled{opacity:.35;cursor:default}
.dtool:focus-visible{outline:2px solid var(--slate);outline-offset:1px}
.add-day{width:100%;margin-top:4px;appearance:none;border:1.5px dashed var(--cedar);background:#f3f6f1;cursor:pointer;font-family:var(--sans);font-size:14.5px;font-weight:700;color:var(--cedar);padding:13px;border-radius:12px;transition:.15s}
.add-day:hover{background:#ebf1e8}
.add-day:focus-visible{outline:2px solid var(--slate);outline-offset:2px}

.modal{position:fixed;inset:0;z-index:100;display:none;align-items:flex-start;justify-content:center;background:rgba(36,31,25,.5);backdrop-filter:blur(3px);overflow-y:auto;padding:24px 14px}
.modal.on{display:flex}
.modal-card{background:var(--paper);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.3);width:100%;max-width:480px;padding:22px 20px;margin:auto}
.modal-card h3{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--ink);margin-bottom:16px;letter-spacing:.03em}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.m-grid .field.full{grid-column:1 / -1}
.m-grid label{font-size:11px;font-weight:700;color:var(--ink-faint);letter-spacing:.04em}
.m-grid input,.m-grid select,.m-grid textarea{font-family:var(--sans);font-size:14px;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px 10px;background:var(--card);width:100%;resize:vertical}
.m-grid input:focus,.m-grid select:focus,.m-grid textarea:focus{outline:2px solid var(--slate);outline-offset:0}
.m-check label{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--ink-soft);cursor:pointer}
.m-check input{width:18px;height:18px;accent-color:var(--momiji)}
.m-actions{display:flex;gap:10px;margin-top:18px}
.m-btn{flex:1;appearance:none;border:none;cursor:pointer;font-family:var(--sans);font-size:15px;font-weight:700;padding:12px;border-radius:10px;letter-spacing:.06em;transition:.15s}
.m-btn.save{background:var(--ink);color:var(--paper)}
.m-btn.save:hover{background:var(--momiji)}
.m-btn.cancel{background:#ece4d4;color:var(--ink-soft)}
.m-btn.del{width:100%;margin-top:10px;background:none;color:var(--momiji);border:1px solid #e6c9c0;font-size:13px;padding:9px}
.m-btn.del:hover{background:#fceae2}
.m-btn:focus-visible{outline:2px solid var(--slate);outline-offset:2px}

@media (max-width:420px){
  .exp-form .grid{grid-template-columns:1fr}
  .timeline{padding-left:48px}.node{left:-48px;width:40px}.timeline::before{left:19px}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>

<script>
/* ===== 設定（架站前請填 Firebase 設定，未填則自動退回本機儲存）=====
   1) 到 https://console.firebase.google.com 建專案 → 建「Realtime Database」
   2) Authentication → 開始使用 → 登入方式 → 啟用「匿名」(Anonymous)
   3) 專案設定 → 你的應用程式 → 複製 firebaseConfig 貼到下面
   4) TRIP_ID 是全團共用代號；規則設為「需登入才能讀寫」，可擋直接打資料庫的掃描 */
const FIREBASE_CONFIG={
  apiKey:"PASTE_API_KEY",
  authDomain:"PASTE.firebaseapp.com",
  databaseURL:"https://PASTE-default-rtdb.firebaseio.com",
  projectId:"PASTE_PROJECT_ID"
};
const TRIP_ID="chubu-2026-7k3p9q";

/* ===== storage layer =====
   共用資料（記帳/待辦/匯率）：有設定 Firebase → 全團即時同步；否則退回本機 localStorage。
   語言偏好：一律存本機（屬於個人 UI 設定，不同步）。 */
const mem={};
const HAS_LS=(()=>{try{const k='__test__';localStorage.setItem(k,'1');localStorage.removeItem(k);return true;}catch(e){return false;}})();
const FB_READY=(typeof firebase!=='undefined')&&FIREBASE_CONFIG.databaseURL&&FIREBASE_CONFIG.databaseURL.indexOf('PASTE')===-1;
let dbRef=null;
if(FB_READY){try{firebase.initializeApp(FIREBASE_CONFIG);dbRef=firebase.database().ref('trips/'+TRIP_ID);}catch(e){console.error('Firebase init failed',e);dbRef=null;}}

function lsGet(k,fb){try{if(HAS_LS){const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}return (k in mem)?mem[k]:fb;}catch(e){return fb;}}
function lsSet(k,v){try{if(HAS_LS){localStorage.setItem(k,JSON.stringify(v));return;}mem[k]=v;}catch(e){}}

async function pushShared(){
  const payload={expenses,todos:todoState,settings:{rate},itinerary};
  if(dbRef){try{await dbRef.set(payload);}catch(e){console.error('sync failed',e);}return;}
  lsSet('trip:shared',payload);
}
/* 只寫被更動的區塊，避免不同人同時編輯不同分頁互相覆蓋 */
async function pushField(field,value){
  if(dbRef){try{await dbRef.child(field).set(value);}catch(e){console.error('sync failed',e);}return;}
  const cur=lsGet('trip:shared',{});cur[field]=value;lsSet('trip:shared',cur);
}
function applySnapshot(d){
  d=d||{};
  expenses=Array.isArray(d.expenses)?d.expenses:[];
  todoState=d.todos||{};
  rate=(d.settings&&d.settings.rate)||0.21;
  itinerary=(Array.isArray(d.itinerary)&&d.itinerary.length)?d.itinerary:clone(DEFAULT_DAYS);
  members=Array.isArray(d.members)?d.members:[];
  const r=document.getElementById('rate');if(r)r.value=rate;
}
function clone(x){return JSON.parse(JSON.stringify(x));}

/* ===== render: itinerary ===== */
function wdFromDate(str){
 const m=String(str||'').match(/(\d{1,2})\D+(\d{1,2})/);
 if(!m)return 0;
 const d=new Date(2026,parseInt(m[1],10)-1,parseInt(m[2],10));
 if(isNaN(d))return 0;
 return (d.getDay()+6)%7; // Mon=0
}
function renderTimeline(){
 document.getElementById('timeline').innerHTML=itinerary.map((d,i)=>{
  const col=REGION[d.r]||'var(--line)';
  const wd=(typeof d.wd==='number')?d.wd:wdFromDate(d.date);
  const leaf=d.leaf?`<svg class="leaf-mark" style="color:var(--momiji)"><use href="#momiji"/></svg>`:'';
  const noteRow=d.note&&t(d.note)?`<div class="row note"><span class="lbl">✿</span><span>${esc(t(d.note))}</span></div>`:'';
  const link=d.url?`<a class="booklink" href="${esc(d.url)}" target="_blank" rel="noopener">🎫 ${esc(t(d.ulabel)||t(UI.bookGeneric))}</a>`:'';
  const tools=editMode?`<div class="day-tools">
     <button class="dtool" title="↑" onclick="moveDay(${i},-1)" ${i===0?'disabled':''}>↑</button>
     <button class="dtool" title="↓" onclick="moveDay(${i},1)" ${i===itinerary.length-1?'disabled':''}>↓</button>
     <button class="dtool" onclick="openDayForm(${i})">✏️</button>
     <button class="dtool" onclick="deleteDay(${i})">🗑</button>
   </div>`:'';
  const stayTxt=esc(t(d.stay));
  const stayUrl=d.stayUrl||(d.stay&&typeof d.stay==='object'?d.stay.url:'');
  const stayHtml=stayUrl?`<a class="stay-link" href="${esc(stayUrl)}" target="_blank" rel="noopener">${stayTxt} ↗</a>`:stayTxt;
  return `<div class="day"><div class="node"><div class="num" style="background:${col}">${String(i+1).padStart(2,'0')}</div>${leaf}</div>
   <div class="card" style="border-left-color:${col}">
    <div class="top"><span class="wd" style="background:${col}">${WD[LANG][wd]}</span><span class="date">${esc(d.date||'')}</span><h3>${esc(t(d.dest))}</h3></div>
    <div class="row"><span class="lbl">${t(UI.rowTrans)}</span><span>${esc(t(d.trans))}</span></div>
    <div class="row"><span class="lbl">${t(UI.rowStay)}</span><span>${stayHtml}</span></div>

 }).join('');

}

 }else{bar.innerHTML='';leg.innerHTML='';}

 if(!expenses.length){list.innerHTML=`<div class="empty">${t(UI.emptyExp)}</div>`;}

 document.getElementById('members-box').innerHTML=members.length?members.map(m=>`<span class="member-chip">${esc(m.name)}<button onclick="removeMember('${m.id}')" aria-label="${t(UI.del)}">×</button></span>`).join(''):'';
}
function computeSettlement(){
 if(members.length<2)return null;
 const paid={},share={};members.forEach(m=>{paid[m.id]=0;share[m.id]=0;});
 let included=0,pool=0;
 expenses.forEach(e=>{
  if(!e.paidBy||!members.find(m=>m.id===e.paidBy))return;
  const v=e.cur==='JPY'?e.amount*rate:e.amount;
  paid[e.paidBy]+=v;pool+=v;included++;
  const per=v/members.length;members.forEach(m=>share[m.id]+=per);
 });
 if(!included)return {included:0};
 const net=members.map(m=>({id:m.id,name:m.name,paid:paid[m.id],net:paid[m.id]-share[m.id]}));
 const cred=net.filter(x=>x.net>0.5).map(x=>({...x})).sort((a,b)=>b.net-a.net);
 const deb=net.filter(x=>x.net<-0.5).map(x=>({name:x.name,amt:-x.net})).sort((a,b)=>b.amt-a.amt);
 const tx=[];let i=0,j=0;
 while(i<cred.length&&j<deb.length){
  const m=Math.min(cred[i].net,deb[j].amt);
  tx.push({from:deb[j].name,to:cred[i].name,amount:m});
  cred[i].net-=m;deb[j].amt-=m;
  if(cred[i].net<0.5)i++;if(deb[j].amt<0.5)j++;
 }
 return {included,pool,perEach:pool/members.length,net,tx};
}
function renderSettlement(){
 const box=document.getElementById('settle-body');
 if(members.length<2){box.innerHTML=`<div class="settle-hint">${t(UI.noMembers)}</div>`;return;}
 const r=computeSettlement();
 if(!r||!r.included){box.innerHTML=`<div class="settle-hint">${t(UI.needPayers)}</div>`;return;}
 const rows=r.net.map(x=>{
  const cls=x.net>0.5?'pos':x.net<-0.5?'neg':'zero';
  const word=x.net>0.5?t(UI.getsWord):x.net<-0.5?t(UI.owesWord):t(UI.evenWord);
  const val=Math.abs(x.net)<0.5?'':' NT$'+fmt(Math.abs(x.net));
  return `<div class="balrow"><span class="nm">${esc(x.name)}</span><span class="paid">${t(UI.paidWord)} NT$${fmt(x.paid)}</span><span class="net ${cls}">${word}${val}</span></div>`;
 }).join('');
 const plan=r.tx.length?r.tx.map(x=>`<div class="txrow"><span class="who">${esc(x.from)}</span><span class="arr">→</span><span class="who">${esc(x.to)}</span><span class="amt">NT$${fmt(x.amount)}</span></div>`).join(''):`<div class="all-even">${t(UI.allEven)}</div>`;
 box.innerHTML=`<div class="settle-meta">${t(UI.perEach)}：<b>NT$${fmt(r.perEach)}</b></div>${rows}<div class="plan-ttl">${t(UI.planTtl)}</div>${plan}`;
}

   </div></div>`;
 }).join('');
}

  firebase.auth().signInAnonymously().catch(function(e){console.error('匿名登入失敗（請確認已在 Firebase 啟用 Anonymous）',e);});
 }else{
  // 本機模式（未設定 Firebase 或預覽環境）
  applySnapshot(lsGet('trip:shared',null));
  renderAll();
 }
})();
</script>
<script>
/* PWA：註冊 service worker（檔名 sw.js 需與本檔同層）。沒上傳 sw.js 也不會壞，只是 Android 無法全螢幕。 */
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
